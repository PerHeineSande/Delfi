<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - Delfi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('images/preparation.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 30px;
            line-height: 1.2;
        }

        p {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .back-button {
            display: inline-block;
            background-color: #fff;
            color: #000;
            padding: 15px 40px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
        }

        .email-signup {
            margin: 40px 0;
        }

        .email-signup h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #ffffff;
        }

        .email-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .email-form input {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            min-width: 250px;
            background-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: background-color 0.3s;
        }

        .email-form input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .email-form input:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .email-form button {
            padding: 12px 30px;
            background-color: #fff;
            color: #000000;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .email-form button:hover {
            background-color: #ffffff;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <p>Vi jobber hardt med å få Delfi klar for deg. Takk for tålmodigheten!</p>
        
        <div class="email-signup">
            <h2>Hold deg oppdatert med nyheter om Delfi</h2>
            <form class="email-form" onsubmit="handleSignup(event)">
                <input type="email" placeholder="Din e-postadresse" required>
                <button type="submit">Meld meg på</button>
            </form>
        </div>
        
        <a href="Delfi.html" class="back-button">Tilbake til hjemmesiden</a>
    </div>

    <script>
        function handleSignup(event) {
            event.preventDefault();
            alert('Takk for at du meldte deg på! Vi kontakter deg snart.');
            event.target.reset();
        }
    </script>
</body>
</html>
